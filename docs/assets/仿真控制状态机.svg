<svg xmlns="http://www.w3.org/2000/svg" width="1060" height="500" viewBox="0 0 1060 500" role="img" aria-label="仿真控制状态机">
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#374151"/>
    </marker>
    <marker id="arrow-muted" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M 0 0 L 10 5 L 0 10 z" fill="#6b7280"/>
    </marker>
    <style>
      text { font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif; fill: #1f2937; }
      .state { rx: 10; ry: 10; stroke-width: 2; }
      .label { font-size: 14px; font-weight: 700; }
      .sub { font-size: 12px; fill: #475569; }
      .edge { fill: none; stroke: #374151; stroke-width: 1.8; marker-end: url(#arrow); }
      .edge-muted { fill: none; stroke: #6b7280; stroke-width: 1.6; stroke-dasharray: 6 5; marker-end: url(#arrow-muted); }
      .edge-label { font-size: 12px; fill: #374151; }
      .note { font-size: 13px; fill: #475569; }
    </style>
  </defs>
  <rect width="1060" height="500" fill="#ffffff"/>
  <circle cx="55" cy="85" r="9" fill="#1f2937"/>

  <g>
    <rect class="state" x="100" y="50" width="150" height="70" fill="#edf6ff" stroke="#5b8ec1"/>
    <text class="label" x="175" y="80" text-anchor="middle">UNLOADED</text>
    <text class="sub" x="175" y="102" text-anchor="middle">未加载配置</text>
  </g>
  <g>
    <rect class="state" x="310" y="50" width="150" height="70" fill="#eaf8f1" stroke="#4f9d73"/>
    <text class="label" x="385" y="80" text-anchor="middle">READY</text>
    <text class="sub" x="385" y="102" text-anchor="middle">已初始化</text>
  </g>
  <g>
    <rect class="state" x="520" y="50" width="150" height="70" fill="#eef4ff" stroke="#4f72c9"/>
    <text class="label" x="595" y="80" text-anchor="middle">RUNNING</text>
    <text class="sub" x="595" y="102" text-anchor="middle">正在推进</text>
  </g>
  <g>
    <rect class="state" x="730" y="50" width="150" height="70" fill="#fff7df" stroke="#d69a2d"/>
    <text class="label" x="805" y="80" text-anchor="middle">PAUSED</text>
    <text class="sub" x="805" y="102" text-anchor="middle">暂停 / 可单步</text>
  </g>
  <g>
    <rect class="state" x="520" y="250" width="150" height="70" fill="#f2f4f8" stroke="#728197"/>
    <text class="label" x="595" y="280" text-anchor="middle">FINISHED</text>
    <text class="sub" x="595" y="302" text-anchor="middle">达到结束时间</text>
  </g>
  <circle cx="990" cy="185" r="12" fill="none" stroke="#1f2937" stroke-width="2"/>
  <circle cx="990" cy="185" r="7" fill="#1f2937"/>

  <path class="edge" d="M64 85 H100"/>
  <path class="edge" d="M250 85 H310"/>
  <text class="edge-label" x="280" y="73" text-anchor="middle">load_config ok</text>
  <path class="edge" d="M460 85 H520"/>
  <text class="edge-label" x="490" y="73" text-anchor="middle">start</text>

  <path class="edge" d="M670 76 H730"/>
  <text class="edge-label" x="700" y="64" text-anchor="middle">pause</text>
  <path class="edge" d="M730 104 H670"/>
  <text class="edge-label" x="700" y="125" text-anchor="middle">start</text>

  <path class="edge" d="M385 50 V24 H805 V50"/>
  <text class="edge-label" x="595" y="20" text-anchor="middle">step</text>

  <path class="edge" d="M595 120 V250"/>
  <text class="edge-label" x="610" y="188">time &gt;= duration</text>
  <path class="edge" d="M805 120 V184 H670 V250"/>
  <text class="edge-label" x="735" y="175" text-anchor="middle">step reaches duration</text>
  <path class="edge" d="M520 285 H385 V120"/>
  <text class="edge-label" x="452" y="274" text-anchor="middle">reset</text>

  <path class="edge-muted" d="M460 85 H940 V176"/>
  <path class="edge-muted" d="M670 85 H940 V176"/>
  <path class="edge-muted" d="M880 85 H940 V176"/>
  <path class="edge-muted" d="M670 285 H940 V194"/>
  <text class="edge-label" x="936" y="70" fill="#6b7280">close</text>

  <rect x="100" y="384" width="740" height="78" rx="8" fill="#f8fafc" stroke="#cbd5e1"/>
  <text class="note" x="120" y="414">load_config() 失败不触发状态迁移；只返回 ERR_CONFIG_NOT_FOUND / ERR_CONFIG_INVALID。</text>
  <text class="note" x="120" y="436">reset() 可从 READY / RUNNING / PAUSED / FINISHED 回到 READY。</text>
  <text class="note" x="120" y="456">运行期异常场景不进入本状态机，后续单独设计。</text>
</svg>
